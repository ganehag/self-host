name: selfhost-seaweed-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: selfhost-seaweed
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d selfhost-seaweed"]
      interval: 3s
      timeout: 3s
      retries: 20

  seaweedfs:
    image: chrislusf/seaweedfs:4.04
    command: ["server", "-s3", "-dir=/data"]
    ports:
      - "8333:8333"

  aapije:
    build:
      context: ../../..
      dockerfile: bench/docker/Dockerfile.aapije
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    environment:
      CONFIG_FILENAME: aapije.conf.yaml
    volumes:
      - ./config:/etc/selfhost:ro
    ports:
      - "18080:80"

  mc:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]

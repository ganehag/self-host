name: read-heavy
base_url: http://127.0.0.1:8080
domain: test
token: root
duration: 60s
warmup: 5s
concurrency: 24
timeout: 10s
headers:
  Accept: application/json
operations:
  - name: read_day
    weight: 30
    method: GET
    path: /v2/timeseries/{{ seriesUUID 0 }}/data?start={{ windowStart "day" }}&end={{ windowEnd "day" }}
    expected_statuses: [200]
  - name: read_week
    weight: 25
    method: GET
    path: /v2/timeseries/{{ seriesUUID 1 }}/data?start={{ windowStart "week" }}&end={{ windowEnd "week" }}
    expected_statuses: [200]
  - name: read_month
    weight: 20
    method: GET
    path: /v2/timeseries/{{ seriesUUID 2 }}/data?start={{ windowStart "month" }}&end={{ windowEnd "month" }}
    expected_statuses: [200]
  - name: read_full
    weight: 15
    method: GET
    path: /v2/timeseries/{{ seriesUUID 3 }}/data?start={{ windowStart "full" }}&end={{ windowEnd "full" }}
    expected_statuses: [200]
  - name: list_users
    weight: 5
    method: GET
    path: /v2/users?limit=100
    expected_statuses: [200]
  - name: list_things
    weight: 5
    method: GET
    path: /v2/things?limit=100
    expected_statuses: [200]

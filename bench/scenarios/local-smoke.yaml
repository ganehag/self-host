name: local-smoke
base_url: http://127.0.0.1:8080
domain: test
token: root
duration: 15s
warmup: 3s
concurrency: 4
timeout: 5s
headers:
  Accept: application/json
operations:
  - name: read_day
    weight: 3
    method: GET
    path: /v2/timeseries/{{ seriesUUID 0 }}/data?start={{ windowStart "day" }}&end={{ windowEnd "day" }}
    expected_statuses: [200]
  - name: list_users
    weight: 1
    method: GET
    path: /v2/users?limit=25
    expected_statuses: [200]

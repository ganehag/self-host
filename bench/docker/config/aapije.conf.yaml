listen:
  host: 0.0.0.0
  port: 80

domainfile: domains.yaml

rate_control:
  req_per_hour: 10000000
  maxburst: 100000
  cleanup: "20minutes"

request_logging:
  enabled: false

openapi_validation:
  enabled: false

db_pool:
  max_open_conns: 64
  max_idle_conns: 32
  conn_max_lifetime: "30m"
  conn_max_idle_time: "5m"

timeseries_queries:
  max_series: 64
  max_points_per_series: 100000
  max_total_points: 1000000

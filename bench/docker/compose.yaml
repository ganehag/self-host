services:
  postgres:
    image: postgres:16-alpine
    container_name: selfhost-bench-postgres
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: selfhost-bench
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d selfhost-bench"]
      interval: 3s
      timeout: 3s
      retries: 20

  aapije:
    build:
      context: ../..
      dockerfile: bench/docker/Dockerfile.aapije
    container_name: selfhost-bench-aapije
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONFIG_FILENAME: aapije.conf.yaml
    volumes:
      - ./config:/etc/selfhost:ro
    ports:
      - "8080:80"
